<div class="team-container">
  <div class="page-header mb-4">
    <h1 class="page-title">
      <i class="fas fa-users"></i>
      Equipo
    </h1>

    <div class="area-selector" *ngIf="allAreas().length > 1">
      <select class="form-select form-select-sm" (change)="onAreaChange($event)">
        <option *ngFor="let area of allAreas()" [value]="area.areaId" [selected]="area.areaId === selectedAreaId()">
          {{ area.areaName }}
        </option>
      </select>
    </div>
  </div>

  <div class="area-info mb-4" *ngIf="currentArea()">
    <div class="card">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="area-icon">
          <i class="fas fa-building fa-2x text-primary"></i>
        </div>
        <div>
          <h5 class="mb-1">{{ currentArea()?.areaName }}</h5>
          <small class="text-secondary">
            <span class="badge bg-light text-dark me-2">{{ currentArea()?.areaCode }}</span>
            Jefe: {{ currentArea()?.jefe?.fullName ?? '—' }}
          </small>
        </div>
        <div class="ms-auto">
          <span class="badge bg-primary fs-6">{{ members().length }} miembros</span>
        </div>
      </div>
    </div>
  </div>

  <app-loading-spinner *ngIf="loading()" message="Cargando equipo..."></app-loading-spinner>

  <app-no-data
    *ngIf="!loading() && members().length === 0"
    title="Sin miembros"
    message="No hay miembros registrados en este equipo"
  ></app-no-data>

  <div class="row" *ngIf="!loading() && members().length > 0">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let member of members()">
      <div class="member-card">
        <div class="member-avatar">
          {{ member.firstName[0] }}{{ member.lastName[0] }}
        </div>
        <div class="member-info">
          <h6 class="member-name">{{ member.fullName }}</h6>
          <div class="member-email text-secondary">{{ member.email }}</div>
          <span class="badge mt-2" [ngClass]="getRoleBadgeClass(member.role)">
            {{ getRoleLabel(member.role) }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
